# SkyPilot task for testing Linux wheel builds
# Usage: sky launch sky_build_wheel.yaml -c heir-wheel -i 10 -y
# afterwards: rsync -Pav heir-wheel:~/sky_workdir/wheelhouse/ ./wheelhouse/
name: heir-wheel-build

resources:
  cpus: 64+
  memory: 128+  # Bazel+LLVM parallel compilation is RAM-heavy

# Syncs the working directory to ~/sky_workdir on the remote.
# Respects .gitignore, so bazel-bin/, venv/, .venv/ etc. are excluded.
workdir: .

setup: |
  set -euo pipefail
  sudo systemctl start docker || true
  # Install cibuildwheel in an isolated venv with Python 3.12 via uv,
  # without touching the system Python (which SkyPilot/ray depends on).
  uv tool install cibuildwheel --python 3.12

run: |
  set -euo pipefail
  if [ -f pyproject.toml ]; then
    repo_root="$PWD"
  elif [ -f "$HOME/sky_workdir/pyproject.toml" ]; then
    repo_root="$HOME/sky_workdir"
  else
    echo "Could not locate HEIR repo root" >&2
    exit 1
  fi
  cd "$repo_root"
  export PATH="$HOME/.local/bin:$PATH"
  cibuildwheel --only cp312-manylinux_x86_64
  echo "Wheel built successfully:"
  ls -la wheelhouse/
